<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-center mb-4">Stock Entry & Exit Management</h2>
        <!-- ADD PRODUCT -->
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
            Add New Product
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <input type="text" id="productName" class="form-control" placeholder="Product Name">
                    </div>
                    <div class="col-md-3">
                        <input type="number" id="productQty" class="form-control" placeholder="Initial Quantity">
                    </div>
                    <div class="col-md-3">
                        <input type="number" id="productPrice" class="form-control" placeholder="Unit Price">
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-success w-100" onclick="addProduct()">Add</button>
                    </div>
                </div>

            </div>
        </div>

        <!-- STOCK ENTRY / EXIT -->
        <div class="card mb-4">

            <div class="card-header bg-dark text-white">
                Stock Movement
            </div>

            <div class="card-body">
                <div class="row g-3">

                    <div class="col-md-4">
                        <select id="productSelect" class="form-select"></select>
                    </div>

                    <div class="col-md-3">
                        <input type="number" id="movementQty" class="form-control" placeholder="Quantity">
                    </div>

                    <div class="col-md-2">
                        <button class="btn btn-success w-100" onclick="stockIn()">Stock IN</button>
                    </div>

                    <div class="col-md-2">
                        <button class="btn btn-danger w-100" onclick="stockOut()">Stock OUT</button>
                    </div>

                </div>

            </div>
        </div>

        <!-- PRODUCT TABLE -->
        <div class="card">

        <div class="card-header bg-secondary text-white">
            Product List
        </div>

        <div class="card-body">

            <table class="table table-bordered text-center">

                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Quantity</th>
                        <th>Price</th>
                    </tr>
                </thead>

                <tbody id="productTable"></tbody>

            </table>

        </div>

    </div>
    </div>

    <script>

        let products = []
        let id = 1

        function addProduct(){

            let name = document.getElementById("productName").value
            let qty = parseInt(document.getElementById("productQty").value)
            let price = document.getElementById("productPrice").value

            if(name === "" || isNaN(qty)){
                alert("Please fill all fields")
            return
            }

            let product = {
                id:id++,
                name:name,
                qty:qty,
                price:price
            }

            products.push(product)

            updateTable()
            updateSelect()

            document.getElementById("productName").value=""
            document.getElementById("productQty").value=""
            document.getElementById("productPrice").value=""

        }


        function stockIn(){

            let index = document.getElementById("productSelect").value
            let qty = parseInt(document.getElementById("movementQty").value)

            if(isNaN(qty)){ return }

            products[index].qty += qty

            updateTable()

        }


        function stockOut(){

            let index = document.getElementById("productSelect").value
            let qty = parseInt(document.getElementById("movementQty").value)

            if(isNaN(qty)){ return }

            if(products[index].qty < qty){
                alert("Not enough stock")
            return
            }

            products[index].qty -= qty

            updateTable()

        }


        function updateTable(){

            let table = document.getElementById("productTable")

            table.innerHTML=""

            products.forEach(p => {

            table.innerHTML += `
                <tr>
                <td>${p.id}</td>
                <td>${p.name}</td>
                <td>${p.qty}</td>
                <td>${p.price}</td>
                </tr>
            `

            })

        }


        function updateSelect(){

            let select = document.getElementById("productSelect")

            select.innerHTML=""

            products.forEach((p,index)=>{

                select.innerHTML += `<option value="${index}">${p.name}</option>`

            })

        }

    </script>


        
    
</body>
</html>
